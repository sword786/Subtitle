name: Desktop App Build

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

jobs:
  release:
    name: Build & Package Desktop Apps
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install Dependencies
        run: npm ci

      - name: Compile and Package Computer App
        run: npm run build:desktop
        env:
          ELECTRON: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive Production Executable Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-app-${{ matrix.os }}
          path: |
            dist_desktop/*.exe
            dist_desktop/*.dmg
            dist_desktop/*.zip
            dist_desktop/*.AppImage
            dist_desktop/*.deb
          if-no-files-found: warn

      - name: Publish Draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist_desktop/*.exe
            dist_desktop/*.dmg
            dist_desktop/*.zip
            dist_desktop/*.AppImage
            dist_desktop/*.deb
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
